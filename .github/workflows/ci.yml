name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  CI:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Build
        run: |
          npm install
          npm run build
      - name: Upload Pages Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy
        uses: actions/deploy-pages@v4